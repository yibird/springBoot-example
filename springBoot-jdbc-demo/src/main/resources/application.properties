#指定项目启动端口
server.port=8080
#指定项目名称
spring.application.name=spring-demo01

#指定数据源驱动类,这里的驱动类对应mysql8.x
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#mysql数据库用户名
spring.datasource.username=root
#mysql数据库用户名对应的密码
spring.datasource.password=root
#指定连接url,连接是test数据库
spring.datasource.url=jdbc:mysql://localhost:3306/test?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC

#######################################配置HikariCP
#配置数据源类型,springBoot2.0版本以HikariCP做为默认连接池,下面这段语句配不配都没有关系
#spring.datasource.type=com.zaxxer.hikari.HikariDataSource
#客户端等待连接池连接的最大毫秒数
#spring.datasource.hikari.connection-timeout=20000
#HikariCP在连接池中维护的最小空闲连接数
#spring.datasource.hikari.minimum-idle=5
#maximumPoolSize配置最大池大小
#spring.datasource.hikari.maximum-pool-size=12
#允许连接在连接池中空闲的最长时间（以毫秒为单位）
#spring.datasource.hikari.idle-timeout=300000
#池中连接关闭后的最长生命周期（以毫秒为单位）
#spring.datasource.hikari.max-lifetime=1200000
#从池返回的连接的默认自动提交行为。默认值为true
#spring.datasource.hikari.auto-commit=true

