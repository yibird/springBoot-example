server.port=8080
spring.application.name=springBoot-mybatis-demo

#指定数据源驱动类,这里的驱动类对应mysql8.x
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#mysql数据库用户名
spring.datasource.username=root
#mysql数据库用户名对应的密码
spring.datasource.password=root
#指定连接url,连接是test数据库
spring.datasource.url=jdbc:mysql://localhost:3306/test?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&allowMultiQueries=true

#设置类型别名包路径
mybatis.type-aliases-package=com.fly.entity
#设置mapper映射文件路径
mybatis.mapper-locations=classpath:mapper/**/*Mapper.xml
#用于指定mybatis配置文件
#mybatis.config-location=

#是否启用缓存
mybatis.configuration.cache-enabled=true